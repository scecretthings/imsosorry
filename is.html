<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>I'm sorry · 3D</title>
  <style>
    /* Reset & full screen tối ưu cho điện thoại */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0f1a;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      touch-action: pan-x pan-y pinch-zoom; /* Cho phép xoay mô hình bằng cảm ứng */
    }

    /* Canvas chiếm toàn bộ màn hình */
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh; /* dynamic viewport height cho mobile */
    }

    /* Lớp phủ nhẹ thông điệp tinh tế, không làm phiền trải nghiệm 3D */
    .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      letter-spacing: 2px;
      text-align: center;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      border-radius: 40px;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.15);
      pointer-events: none; /* không cản thao tác chạm */
      z-index: 10;
    }

    /* Ẩn hint khi màn hình quá nhỏ để tránh che chữ */
    @media (max-width: 380px) {
      .hint {
        font-size: 11px;
        padding: 5px 16px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="hint">✦ chạm & xoay ✦</div>

  <!-- Import Three.js và addons từ CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ------------------------------------------------------------
    // 1. Khởi tạo scene, camera, renderers
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    
    // Nền gradient tối nhẹ nhàng (deep night)
    scene.background = new THREE.Color(0x0b0e17);
    
    // Thêm một chút sương mù để tạo chiều sâu
    scene.fog = new THREE.Fog(0x0b0e17, 3, 15);

    // Camera phối cảnh - tối ưu cho điện thoại
    const camera = new THREE.PerspectiveCamera(
      45,             // Góc nhìn vừa phải, không méo quá
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0.3, 5.5);
    camera.lookAt(0, 0, 0);

    // WebGL Renderer
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true,
      alpha: false,
      powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5)); // Giới hạn pixel ratio cho hiệu năng
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setClearColor(0x0a0f1a);
    document.body.appendChild(renderer.domElement);

    // CSS2 Renderer cho text sắc nét (dạng 3D vẫn là text thật, không phải texture mờ)
    const css2DRenderer = new CSS2DRenderer();
    css2DRenderer.setSize(window.innerWidth, window.innerHeight);
    css2DRenderer.domElement.style.position = 'absolute';
    css2DRenderer.domElement.style.top = '0px';
    css2DRenderer.domElement.style.left = '0px';
    css2DRenderer.domElement.style.pointerEvents = 'none'; // Cho phép tương tác chạm xuyên qua lớp text
    document.body.appendChild(css2DRenderer.domElement);

    // ------------------------------------------------------------
    // 2. Điều khiển chạm/xoay (OrbitControls) cho mobile
    // ------------------------------------------------------------
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.8;
    controls.zoomSpeed = 0.5;
    controls.panSpeed = 0.4;
    controls.enableZoom = true;
    controls.zoomSpeed = 0.6;
    controls.minDistance = 3.2;
    controls.maxDistance = 9.0;
    controls.target.set(0, 0.1, 0);
    controls.update();
    
    // Cho phép xoay tự do, giới hạn góc để tránh lộn ngược quá khó chịu
    controls.minPolarAngle = 0.2;   // hơi chếch từ dưới lên
    controls.maxPolarAngle = Math.PI - 0.2; // gần 180 độ
    
    // Tự động xoay nhẹ ban đầu để tạo hiệu ứng "sống"
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.7;
    
    // Khi người dùng tương tác, tạm dừng auto rotate một lúc
    let idleTimer;
    function resetAutoRotate() {
      controls.autoRotate = false;
      if (idleTimer) clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        controls.autoRotate = true;
      }, 3000);
    }
    
    renderer.domElement.addEventListener('touchstart', resetAutoRotate);
    renderer.domElement.addEventListener('mousedown', resetAutoRotate);
    renderer.domElement.addEventListener('wheel', resetAutoRotate);
    
    // ------------------------------------------------------------
    // 3. Ánh sáng nghệ thuật
    // ------------------------------------------------------------
    
    // Ánh sáng môi trường dịu
    const ambientLight = new THREE.AmbientLight(0x404066);
    scene.add(ambientLight);
    
    // Đèn key light chính (trắng ấm) tạo bóng đổ
    const keyLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    keyLight.position.set(2, 3, 4);
    keyLight.castShadow = true;
    keyLight.receiveShadow = true;
    keyLight.shadow.mapSize.width = 512;
    keyLight.shadow.mapSize.height = 512;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 20;
    keyLight.shadow.camera.left = -5;
    keyLight.shadow.camera.right = 5;
    keyLight.shadow.camera.top = 5;
    keyLight.shadow.camera.bottom = -3;
    keyLight.shadow.bias = -0.0005;
    scene.add(keyLight);
    
    // Đèn fill màu tím nhạt từ bên trái
    const fillLight = new THREE.DirectionalLight(0xccddff, 0.9);
    fillLight.position.set(-3, 1, 1.5);
    fillLight.castShadow = false;
    scene.add(fillLight);
    
    // Đèn rim light (viền) màu hồng nhạt phía sau
    const rimLight = new THREE.DirectionalLight(0xffaacc, 0.8);
    rimLight.position.set(0, 0.5, -3);
    rimLight.castShadow = false;
    scene.add(rimLight);
    
    // Đèn điểm nhấn dưới chân chữ
    const bottomLight = new THREE.PointLight(0x4466aa, 0.7, 6);
    bottomLight.position.set(0, -1.2, 0.8);
    scene.add(bottomLight);
    
    // ------------------------------------------------------------
    // 4. Tạo chữ "I'm sorry" dạng 3D bằng CSS2D (text vector sắc nét)
    //    nhưng được đặt trong không gian 3D với hiệu ứng nổi.
    // ------------------------------------------------------------
    const textGroup = new THREE.Group();
    
    // Hàm tạo chữ CSS2D với style 3D nổi bật
    function create3DText(text, position, fontSize = '3.2rem', color = '#ffffff') {
      const div = document.createElement('div');
      div.textContent = text;
      div.style.fontWeight = '800';
      div.style.fontSize = fontSize;
      div.style.color = color;
      div.style.textShadow = `
        0 0 20px rgba(255, 200, 220, 0.7),
        0 0 40px rgba(180, 160, 255, 0.5),
        0 4px 15px rgba(0,0,0,0.6),
        2px 6px 10px rgba(0,0,0,0.5)
      `;
      div.style.letterSpacing = '0.02em';
      div.style.fontFamily = "'Poppins', 'Segoe UI', 'Helvetica Neue', sans-serif";
      div.style.background = 'linear-gradient(135deg, #ffffff 0%, #f0d9ff 80%)';
      div.style.webkitBackgroundClip = 'text';
      div.style.backgroundClip = 'text';
      div.style.webkitTextFillColor = 'transparent';
      // Fallback cho trình duyệt không hỗ trợ background-clip text
      div.style.color = 'white';
      div.style.filter = 'drop-shadow(0 0 15px rgba(200, 180, 255, 0.8))';
      
      const label = new CSS2DObject(div);
      label.position.copy(position);
      return label;
    }
    
    // Tạo từng chữ cái để có thể bố trí cong nhẹ hoặc theo hàng
    // Sử dụng cụm "I'm sorry" nhưng tách thành các phần để tạo bố cục đẹp
    const phrase = "I'm sorry";
    // Chúng ta sẽ tạo một dòng chữ lớn duy nhất, nhưng đặt trong group để dễ xoay
    const mainTextDiv = document.createElement('div');
    mainTextDiv.textContent = phrase;
    mainTextDiv.style.fontWeight = '900';
    mainTextDiv.style.fontSize = '4.2rem';
    mainTextDiv.style.letterSpacing = '0.03em';
    mainTextDiv.style.fontFamily = "'Poppins', 'Segoe UI', 'Helvetica Neue', sans-serif";
    mainTextDiv.style.background = 'linear-gradient(180deg, #ffffff 10%, #e6ccff 50%, #c9a9ff 90%)';
    mainTextDiv.style.webkitBackgroundClip = 'text';
    mainTextDiv.style.backgroundClip = 'text';
    mainTextDiv.style.webkitTextFillColor = 'transparent';
    mainTextDiv.style.color = 'white'; // fallback
    mainTextDiv.style.filter = 'drop-shadow(0 0 25px rgba(210, 180, 255, 0.9)) drop-shadow(0 8px 15px rgba(0,0,0,0.5))';
    mainTextDiv.style.textShadow = '0 0 30px rgba(180, 130, 255, 0.8), 0 0 60px rgba(255, 180, 200, 0.6), 2px 6px 10px black';
    
    // Thêm chút hiệu ứng viền sáng phụ bằng pseudo không được, nên dùng textShadow mạnh
    
    const mainLabel = new CSS2DObject(mainTextDiv);
    mainLabel.position.set(0, 0.15, 0);
    textGroup.add(mainLabel);
    
    // Thêm một lớp text phía sau mờ hơn tạo cảm giác khối (fake 3D layer)
    const shadowTextDiv = document.createElement('div');
    shadowTextDiv.textContent = phrase;
    shadowTextDiv.style.fontWeight = '900';
    shadowTextDiv.style.fontSize = '4.2rem';
    shadowTextDiv.style.letterSpacing = '0.03em';
    shadowTextDiv.style.fontFamily = "'Poppins', 'Segoe UI', 'Helvetica Neue', sans-serif";
    shadowTextDiv.style.color = 'rgba(80, 60, 140, 0.25)';
    shadowTextDiv.style.textShadow = '0 0 15px rgba(0,0,0,0.5)';
    shadowTextDiv.style.position = 'relative';
    
    const shadowLabel = new CSS2DObject(shadowTextDiv);
    shadowLabel.position.set(0.08, 0.05, -0.15);
    textGroup.add(shadowLabel);
    
    // Thêm một layer nữa ở dưới
    const deepShadowDiv = document.createElement('div');
    deepShadowDiv.textContent = phrase;
    deepShadowDiv.style.fontWeight = '900';
    deepShadowDiv.style.fontSize = '4.2rem';
    deepShadowDiv.style.letterSpacing = '0.03em';
    deepShadowDiv.style.fontFamily = "'Poppins', 'Segoe UI', 'Helvetica Neue', sans-serif";
    deepShadowDiv.style.color = 'rgba(30, 20, 60, 0.35)';
    deepShadowDiv.style.textShadow = '0 0 8px black';
    
    const deepLabel = new CSS2DObject(deepShadowDiv);
    deepLabel.position.set(0.15, -0.05, -0.3);
    textGroup.add(deepLabel);
    
    scene.add(textGroup);
    
    // ------------------------------------------------------------
    // 5. Các yếu tố hình ảnh 3D bổ sung: hạt lấp lánh, vòng sáng
    // ------------------------------------------------------------
    
    // Vòng tròn mờ phía sau chữ (hiệu ứng halo)
    const ringGeometry = new THREE.TorusGeometry(1.9, 0.02, 32, 100);
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: 0x9f7aea,
      emissive: new THREE.Color(0x331144),
      roughness: 0.4,
      metalness: 0.3,
      transparent: true,
      opacity: 0.5
    });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.position.set(0, 0.1, -0.4);
    ring.castShadow = false;
    ring.receiveShadow = false;
    scene.add(ring);
    
    const ring2Geometry = new THREE.TorusGeometry(2.15, 0.015, 24, 90);
    const ring2Material = new THREE.MeshStandardMaterial({
      color: 0xb794f4,
      emissive: new THREE.Color(0x220033),
      roughness: 0.5,
      metalness: 0.2,
      transparent: true,
      opacity: 0.35
    });
    const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
    ring2.position.set(0, 0.15, -0.5);
    ring2.rotation.x = Math.PI / 2;
    scene.add(ring2);
    
    // Hệ thống hạt lơ lửng (particles) tạo không gian lãng mạn
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 400;
    const positionsArray = new Float32Array(particlesCount * 3);
    const colorsArray = new Float32Array(particlesCount * 3);
    
    const pastelColors = [
      new THREE.Color(0xd4b5ff), // tím nhạt
      new THREE.Color(0xffb7c5), // hồng nhạt
      new THREE.Color(0xb5d0ff), // xanh nhạt
      new THREE.Color(0xffd6e0), // hồng phấn
      new THREE.Color(0xe0c3ff)  // oải hương
    ];
    
    for (let i = 0; i < particlesCount * 3; i += 3) {
      // Vị trí ngẫu nhiên trong khối cầu xung quanh
      const radius = 2.8 + Math.random() * 2.5;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.asin((Math.random() * 2) - 1);
      
      positionsArray[i] = Math.cos(theta) * Math.cos(phi) * radius;
      positionsArray[i+1] = Math.sin(phi) * radius * 0.9 + 0.2;
      positionsArray[i+2] = Math.sin(theta) * Math.cos(phi) * radius;
      
      const colorChoice = pastelColors[Math.floor(Math.random() * pastelColors.length)];
      colorsArray[i] = colorChoice.r;
      colorsArray[i+1] = colorChoice.g;
      colorsArray[i+2] = colorChoice.b;
    }
    
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
    particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));
    
    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.045,
      map: createCircleTexture(),
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      vertexColors: true,
      transparent: true,
      opacity: 0.7,
    });
    
    function createCircleTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 16;
      canvas.height = 16;
      const ctx = canvas.getContext('2d');
      ctx.beginPath();
      ctx.arc(8, 8, 6, 0, 2 * Math.PI);
      ctx.fillStyle = 'white';
      ctx.fill();
      return new THREE.CanvasTexture(canvas);
    }
    
    const particles = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particles);
    
    // Thêm vài ngôi sao nhỏ tĩnh (sprite) không cần thiết lắm
    
    // ------------------------------------------------------------
    // 6. Hiệu ứng chuyển động nhẹ
    // ------------------------------------------------------------
    
    // Biến cho animation
    let clock = new THREE.Clock();
    
    // ------------------------------------------------------------
    // 7. Animation loop
    // ------------------------------------------------------------
    function animate() {
      const delta = clock.getDelta();
      const elapsedTime = performance.now() * 0.001; // giây
      
      // Tự động xoay nếu được bật
      controls.update();
      
      // Xoay vòng tròn nhẹ nhàng
      ring.rotation.z += 0.0015;
      ring.rotation.y += 0.0008;
      ring2.rotation.x += 0.001;
      ring2.rotation.y += 0.0012;
      
      // Xoay nhẹ group chữ? Giữ nguyên để text luôn hướng về camera (CSS2D tự động)
      // Nhưng có thể xoay nhẹ group để tạo hiệu ứng động
      // textGroup.rotation.y = Math.sin(elapsedTime * 0.3) * 0.03;
      
      // Xoay hệ hạt
      particles.rotation.y += 0.0004;
      particles.rotation.x += 0.0002;
      
      // Điều chỉnh độ sáng của ring theo thời gian
      const pulse = 0.4 + Math.sin(elapsedTime * 3) * 0.08;
      ring.material.opacity = pulse;
      ring2.material.opacity = pulse * 0.7;
      
      // Render
      renderer.render(scene, camera);
      css2DRenderer.render(scene, camera);
      
      requestAnimationFrame(animate);
    }
    
    animate();
    
    // ------------------------------------------------------------
    // 8. Xử lý resize màn hình (xoay điện thoại)
    // ------------------------------------------------------------
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      css2DRenderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    // Xử lý khi orientation thay đổi (mobile)
    window.addEventListener('orientationchange', () => {
      setTimeout(() => {
        onWindowResize();
      }, 50);
    });
    
    console.log('✨ Trang web 3D "I\'m sorry" đã sẵn sàng. Chạm và xoay để khám phá.');
  </script>
</body>
</html>
